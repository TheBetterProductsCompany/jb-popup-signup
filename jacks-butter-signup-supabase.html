<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Jacks Butter — Drop 1</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }

  :root {
    --bg: #EBE7E1;
    --brown: #2E2114;
    --brown-light: rgba(46, 33, 20, 0.6);
    --brown-subtle: rgba(46, 33, 20, 0.1);
    --gold: #C8A96E;
    --gold-light: rgba(200, 169, 110, 0.15);
    --cream: #FFF8E7;
    --success: #4A7C59;
    --error: #C45B4A;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background-color: var(--bg);
    color: var(--brown);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
    overflow-x: hidden;
  }

  .container {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: fadeUp 0.8s ease-out both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  .brand-mark {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--brown);
    margin-bottom: 48px;
    opacity: 0.7;
  }

  .headline {
    font-family: 'Playfair Display', serif;
    font-size: 42px;
    font-weight: 700;
    line-height: 1.1;
    text-align: center;
    margin-bottom: 12px;
    letter-spacing: -0.5px;
  }

  .headline em {
    font-style: italic;
    font-weight: 400;
  }

  .subheadline {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 300;
    color: var(--brown-light);
    text-align: center;
    margin-bottom: 48px;
    line-height: 1.5;
    max-width: 300px;
  }

  .form-wrapper {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .input-group {
    position: relative;
    width: 100%;
  }

  .input-group label {
    display: block;
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--brown-light);
    margin-bottom: 8px;
  }

  .input-group input {
    width: 100%;
    padding: 16px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 400;
    color: var(--brown);
    background: var(--cream);
    border: 1.5px solid var(--brown-subtle);
    border-radius: 12px;
    outline: none;
    transition: all 0.3s ease;
    -webkit-appearance: none;
  }

  .input-group input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px var(--gold-light);
  }

  .input-group input::placeholder {
    color: rgba(46, 33, 20, 0.3);
  }

  .checkbox-group {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 4px 0;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
  }

  .checkbox-group input[type="checkbox"] { display: none; }

  .checkbox-custom {
    width: 22px;
    height: 22px;
    min-width: 22px;
    border: 1.5px solid var(--brown-subtle);
    border-radius: 6px;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    margin-top: 1px;
  }

  .checkbox-group input[type="checkbox"]:checked + .checkbox-custom {
    background: var(--brown);
    border-color: var(--brown);
  }

  .checkbox-custom svg {
    width: 12px;
    height: 12px;
    opacity: 0;
    transition: opacity 0.2s ease;
  }

  .checkbox-group input[type="checkbox"]:checked + .checkbox-custom svg {
    opacity: 1;
  }

  .checkbox-label {
    font-size: 14px;
    font-weight: 400;
    color: var(--brown-light);
    line-height: 1.5;
  }

  .submit-btn {
    width: 100%;
    padding: 18px;
    margin-top: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--cream);
    background: var(--brown);
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  .submit-btn:active { transform: scale(0.98); }
  .submit-btn:hover { opacity: 0.9; }
  .submit-btn.loading { pointer-events: none; opacity: 0.7; }

  .error-msg {
    font-size: 13px;
    color: var(--error);
    text-align: center;
    margin-top: 8px;
    display: none;
  }

  .error-msg.show { display: block; }

  .divider {
    width: 40px;
    height: 1px;
    background: var(--brown-subtle);
    margin: 40px auto;
  }

  .footer-note {
    font-size: 12px;
    font-weight: 300;
    color: rgba(46, 33, 20, 0.35);
    text-align: center;
    line-height: 1.6;
  }

  .signup-count {
    font-size: 12px;
    font-weight: 400;
    color: var(--gold);
    text-align: center;
    margin-top: 12px;
    opacity: 0.8;
  }

  /* Success State */
  .success-container {
    display: none;
    flex-direction: column;
    align-items: center;
    text-align: center;
    animation: fadeUp 0.6s ease-out both;
  }

  .success-container.show { display: flex; }
  .form-container.hide { display: none; }

  .success-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--brown);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
  }

  .success-icon svg { width: 28px; height: 28px; }

  .success-headline {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 12px;
  }

  .success-sub {
    font-size: 15px;
    font-weight: 300;
    color: var(--brown-light);
    line-height: 1.6;
    max-width: 280px;
    margin-bottom: 36px;
  }

  .success-ig {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 28px;
    background: var(--brown);
    color: var(--cream);
    border-radius: 12px;
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
  }

  .success-ig:active { transform: scale(0.98); }

  .reset-btn {
    margin-top: 32px;
    background: none;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--brown-light);
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
  }
</style>
</head>
<body>

<div class="container">
  
  <div class="brand-mark">Jacks Butter</div>

  <!-- Form State -->
  <div class="form-container" id="formContainer">
    <h1 class="headline">Drop 1 is <em>coming</em></h1>
    <p class="subheadline">A2 cultured butter, made by a chef. Be the first to know before it sells out.</p>

    <div class="form-wrapper">
      <div class="input-group">
        <label>First Name</label>
        <input type="text" id="firstName" placeholder="Your first name" autocomplete="given-name">
      </div>

      <div class="input-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
      </div>

      <div class="input-group">
        <label>Phone <span style="font-weight:300; letter-spacing:0; text-transform:none;">(optional)</span></label>
        <input type="tel" id="phone" placeholder="(416) 000-0000" autocomplete="tel">
      </div>

      <label class="checkbox-group" for="smsOptIn">
        <input type="checkbox" id="smsOptIn" checked>
        <span class="checkbox-custom">
          <svg viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M2 6.5L4.5 9L10 3" stroke="#FFF8E7" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </span>
        <span class="checkbox-label">Text me when Drop 1 goes live</span>
      </label>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        Notify Me
      </button>

      <p class="error-msg" id="errorMsg"></p>
    </div>

    <div class="divider"></div>
    <p class="footer-note">No spam. Just butter.<br>Unsubscribe anytime.</p>
  </div>

  <!-- Success State -->
  <div class="success-container" id="successContainer">
    <div class="success-icon">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 13l4 4L19 7" stroke="#FFF8E7" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2 class="success-headline">You're in.</h2>
    <p class="success-sub">We'll notify you before Drop 1 goes live. Follow us for first looks and behind-the-scenes.</p>
    <a href="https://www.instagram.com/jacksbutter" target="_blank" class="success-ig">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      Follow @jacksbutter
    </a>
    <button class="reset-btn" onclick="resetForm()">Add another person</button>
  </div>

</div>

<script>
  // ============================================
  // SUPABASE CONFIG — UPDATE THESE TWO VALUES
  // ============================================
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';       // e.g. https://xyzabc.supabase.co
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY'; // your anon/public key
  // ============================================

  async function saveToSupabase(entry) {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/popup_signups`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({
          first_name: entry.firstName,
          email: entry.email,
          phone: entry.phone,
          sms_opt_in: entry.smsOptIn,
          source: entry.source
        })
      });

      if (res.status === 409) {
        return { success: false, duplicate: true };
      }

      if (!res.ok) {
        throw new Error(`HTTP ${res.status}`);
      }

      return { success: true };
    } catch (err) {
      console.error('Supabase error:', err);
      return { success: false, duplicate: false };
    }
  }

  function saveToLocalBackup(entry) {
    const backups = JSON.parse(localStorage.getItem('jb_signups_backup') || '[]');
    backups.push(entry);
    localStorage.setItem('jb_signups_backup', JSON.stringify(backups));
  }

  async function handleSubmit() {
    const firstName = document.getElementById('firstName').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const smsOptIn = document.getElementById('smsOptIn').checked;
    const errorEl = document.getElementById('errorMsg');

    errorEl.classList.remove('show');

    // Validate
    if (!firstName) { shakeInput('firstName'); return; }
    if (!email || !email.includes('@') || !email.includes('.')) { shakeInput('email'); return; }

    const btn = document.getElementById('submitBtn');
    btn.classList.add('loading');
    btn.textContent = '...';

    const entry = {
      firstName,
      email,
      phone: phone || null,
      smsOptIn,
      source: 'equinox-yorkville-popup',
      timestamp: new Date().toISOString()
    };

    // Try Supabase first
    const result = await saveToSupabase(entry);

    if (result.duplicate) {
      btn.classList.remove('loading');
      btn.textContent = 'Notify Me';
      errorEl.textContent = "You're already on the list — we've got you.";
      errorEl.classList.add('show');
      return;
    }

    if (!result.success) {
      // Supabase failed — save locally as backup
      saveToLocalBackup(entry);
      console.warn('Saved to local backup — sync later');
    }

    // Show success
    setTimeout(() => {
      document.getElementById('formContainer').classList.add('hide');
      document.getElementById('successContainer').classList.add('show');
    }, 600);
  }

  function resetForm() {
    document.getElementById('firstName').value = '';
    document.getElementById('email').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('smsOptIn').checked = true;
    document.getElementById('errorMsg').classList.remove('show');

    const btn = document.getElementById('submitBtn');
    btn.classList.remove('loading');
    btn.textContent = 'Notify Me';

    document.getElementById('successContainer').classList.remove('show');
    document.getElementById('formContainer').classList.remove('hide');
  }

  function shakeInput(id) {
    const el = document.getElementById(id);
    el.style.borderColor = 'var(--error)';
    el.style.animation = 'shake 0.4s ease';
    setTimeout(() => {
      el.style.borderColor = '';
      el.style.animation = '';
    }, 500);
    el.focus();
  }

  // Export local backups if any failed to sync
  window.exportBackups = function() {
    const data = JSON.parse(localStorage.getItem('jb_signups_backup') || '[]');
    if (data.length === 0) { console.log('No local backups — all synced to Supabase.'); return; }
    const csv = 'First Name,Email,Phone,SMS Opt-In,Timestamp,Source\n' +
      data.map(d => `${d.firstName},${d.email},${d.phone || ''},${d.smsOptIn},${d.timestamp},${d.source}`).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'jacks-butter-signups-backup.csv';
    a.click();
    URL.revokeObjectURL(url);
    console.log(`Exported ${data.length} backup signups.`);
  };

  console.log('Jacks Butter Signup — Supabase connected. Type exportBackups() to download any locally cached signups.');
</script>

</body>
</html>
